# Code Reviewer Configuration File
# This file configures the bop application for CI/CD usage

# LLM Provider Configuration
# Providers define connection details (API keys, credentials, timeouts) for LLM services.
# The defaultModel is used when a reviewer doesn't specify its own model.
# Reviewers (defined below) reference these providers by name.
providers:
  # Static provider (for testing - returns canned responses)
  static:
    enabled: false
    defaultModel: "static-model"

  # OpenAI provider (GPT models)
  openai:
    enabled: true
    defaultModel: "gpt-5.4"
    apiKey: "${OPENAI_API_KEY}"

  # Anthropic provider (Claude models)
  anthropic:
    enabled: true
    defaultModel: "claude-sonnet-4-6"
    apiKey: "${ANTHROPIC_API_KEY}"

  # Google Gemini provider
  gemini:
    enabled: true
    defaultModel: "gemini-3.1-pro-preview"
    apiKey: "${GEMINI_API_KEY}"
    timeout: "180s"  # Gemini 3.1 Pro is a reasoning model that may need extra time

  # Ollama provider (local LLM)
  # ollama:
  #   enabled: false
  #   defaultModel: "qwen3:235b"

# Reviewer Personas (Phase 3.2 - OPTIONAL)
# Each reviewer represents a specialized code review perspective.
# Reviewers reference providers defined above for LLM connectivity.
# If this section is omitted, the original provider-based dispatch is used.
#
# The 'model' field is optional - if not specified, uses the provider's defaultModel.
reviewers:
  # Security-focused reviewer using Claude for nuanced vulnerability detection
  # Note: model omitted - uses anthropic's defaultModel (claude-sonnet-4-6)
  security:
    provider: "anthropic"
    weight: 1.5  # Higher weight for security findings
    persona: |
      You are a senior security engineer specializing in application security.
      Focus on OWASP Top 10 vulnerabilities, authentication/authorization flaws,
      injection attacks, and sensitive data exposure. You have deep experience
      with secure coding practices and threat modeling.

      **Trust Boundaries (CRITICAL):**
      Not all data sources require the same security scrutiny. Apply threat modeling
      based on the actual trust level of each data source:

      UNTRUSTED (apply strict validation):
      - User input (HTTP requests, form data, CLI arguments)
      - External API responses from third parties
      - File uploads and user-provided content
      - Data from untrusted networks

      TRUSTED (basic sanity checks suffice):
      - Configured LLM provider responses (Anthropic, OpenAI, Google APIs)
      - Data from application's own database (prior review findings, config)
      - Application configuration files (bop.yaml, environment variables)
      - Internal service-to-service communication

      For TRUSTED sources, don't raise findings like:
      - "Prompt injection" from internal database data
      - "Resource exhaustion" from configured LLM provider responses
      - "JSON parsing DoS" from trusted API responses
      - "Malicious input" for data the application itself generated

      Focus security findings on actual attack surfaces where untrusted data
      crosses into the application. Over-engineering defenses against trusted
      internal data paths creates noise without security benefit.
    focus:
      - security
      - authentication
      - authorization
    ignore:
      - style
      - documentation

  # Architecture/maintainability reviewer using GPT for code quality analysis
  # Note: model omitted - uses openai's defaultModel (gpt-5.4)
  architecture:
    provider: "openai"
    weight: 1.0
    persona: |
      You are a software architect focused on code maintainability and design.
      Evaluate SOLID principles, clean architecture patterns, appropriate
      abstractions, and long-term maintainability. You prioritize readable,
      well-structured code that's easy to extend and test.
    focus:
      - maintainability
      - architecture
      - complexity
    ignore:
      - performance  # Leave to performance reviewer

  # Performance/efficiency reviewer using Gemini for deep analysis
  # Example of explicit model override (uses different model than provider default)
  performance:
    provider: "gemini"
    model: "gemini-3.1-flash-lite-preview"  # Override: use flash for faster performance checks
    weight: 1.0
    persona: |
      You are a performance engineer specializing in system efficiency.
      Identify N+1 queries, unnecessary allocations, poor algorithmic
      complexity, resource leaks, and concurrency issues. You focus on
      measurable performance impacts rather than micro-optimizations.
    focus:
      - performance
      - scalability
      - resource_management
    ignore:
      - style
      - documentation

  # Observability/telemetry reviewer using a smaller model for pattern-based checks
  # This reviewer focuses on logging, metrics, tracing, and operational visibility.
  # Not included in defaultReviewers - opt-in via --reviewers flag
  observability:
    provider: "gemini"
    model: "gemini-3.1-flash-lite-preview"  # Smaller model sufficient for pattern-matching
    weight: 1.0
    persona: |
      You are a senior observability engineer specializing in production systems.
      Your expertise spans distributed tracing, metrics, logging, and alerting.

      Focus on these high-value areas:

      **Tracing:**
      - Missing span creation at service boundaries (HTTP handlers, RPC calls, queue consumers)
      - Context not propagated to downstream calls (missing ctx parameter)
      - Missing defer span.End() or span.SetStatus() on errors
      - Spans without meaningful attributes for debugging

      **Metrics:**
      - Missing request/response metrics at entry points (count, latency, errors)
      - Unbounded label cardinality (user IDs, request IDs as labels = cardinality explosion)
      - Error paths without error counters
      - Missing resource utilization metrics (connection pools, caches, queues)

      **Logging:**
      - Errors caught but not logged, or logged without context
      - Missing correlation IDs / trace IDs in log messages
      - Inappropriate log levels (INFO for errors, ERROR for expected conditions)
      - Sensitive data (passwords, tokens, PII) in log messages
      - Inconsistent structured logging (mixing Printf with structured loggers)

      **Alertability:**
      - Operations that fail silently with no way to detect in production
      - Missing health check endpoints or readiness probes

      Prioritize findings at system boundaries and error paths. Avoid suggesting
      logging for every internal function - focus on entry points, exits, and
      decision points that operators need visibility into.
    focus:
      - observability
      - logging
      - metrics
      - tracing
    ignore:
      - style
      - architecture
      - security  # Leave to security reviewer

# Default reviewers to use when no --reviewers flag is specified
defaultReviewers:
  - security
  - architecture
  - performance

# Store Configuration
# Enables persistence of review history to SQLite database
store:
  enabled: true
  path: "~/.config/bop/reviews.db"

# Output Configuration
output:
  directory: "./review-output"

# Git Configuration (optional)
# git:
#   repositoryDir: "."

# Planning Configuration (disabled for CI/CD - not interactive)
planning:
  enabled: false
  provider: "openai"
  model: "gpt-5.4-mini"
  maxQuestions: 5
  timeout: "30s"

# Merge Configuration (for multi-provider consensus)
merge:
  enabled: true
  strategy: "consensus"
  # LLM provider for summary synthesis (defaults to anthropic/claude-haiku-4-5)
  provider: "anthropic"
  model: "claude-haiku-4-5"

# Verification Configuration (agent verification of findings)
verification:
  enabled: true
  # LLM provider for verification (defaults to gemini/gemini-3-flash-preview)
  provider: "gemini"
  model: "gemini-3.1-flash-lite-preview"
  maxTokens: 64000
  depth: "medium"
  costCeiling: 0.50
  confidence:
    default: 75
    critical: 60
    high: 70
    medium: 75
    low: 85

# Budget Configuration (cost control)
# budget:
#   hardCapUSD: 10.0
#   degradationPolicy:
#     - "reduce-providers"
#     - "reduce-context"

# Redaction Configuration (secret protection)
# IMPORTANT: Enable this for production use!
redaction:
  enabled: true
  denyGlobs:
    - "**/*.env"
    - "**/*.pem"
    - "**/*.key"
    - "**/credentials.json"
    - "**/secrets.*"

# Determinism Configuration (reproducible reviews)
determinism:
  enabled: false
  temperature: 0.0
  useSeed: true

# Observability Configuration
observability:
  logging:
    enabled: true
    level: "info"
    format: "human"
    redactAPIKeys: true
  metrics:
    enabled: true

# Theme Extraction Configuration (Issue #240)
# Extracts themes, conclusions, and disputed patterns from prior findings
# to prevent repeat findings across review rounds.
themeExtraction:
  enabled: true
  # Extraction strategy determines what context is extracted:
  # - "abstract": High-level themes only (e.g., "input validation", "error handling")
  # - "specific": Themes + specific conclusions and anti-patterns
  # - "comprehensive": Themes + conclusions + disputed patterns with rationales (default)
  #
  # "comprehensive" is most effective at preventing repeat findings because it:
  # 1. Includes abstract themes for conceptual coverage
  # 2. Adds specific conclusions (e.g., "truncation uses >= intentionally")
  # 3. Extracts disputed patterns with WHY they were disputed
  strategy: "comprehensive"
  # LLM provider for theme extraction - uses a small, fast model since the task
  # is simple (extracting 2-5 word phrases from finding descriptions)
  provider: "anthropic"
  model: "claude-haiku-4-5"
  # Maximum output tokens. The response is just a small JSON array like
  # {"themes": ["input validation", "error handling"]}, so this is generous.
  maxTokens: 4096
  # Cost guard: minimum prior findings required before theme extraction runs.
  # With only 1-2 findings, there's not enough data to form meaningful themes,
  # so we skip the LLM call entirely.
  minFindingsForTheme: 3
  # Limits themes injected into the review prompt to prevent context bloat.
  # More than 10 themes would waste tokens on the main reviewer prompt.
  maxThemes: 10

# Deduplication Configuration
# Controls finding deduplication across providers
deduplication:
  semantic:
    enabled: true
    # LLM provider for semantic comparison (uses a fast model)
    # NOTE: Change provider/model if you don't have ANTHROPIC_API_KEY configured
    provider: "anthropic"
    model: "claude-haiku-4-5"
    maxTokens: 64000
    # Only compare findings within this line distance
    lineThreshold: 10
    # Cost guard: max pairs to compare per review
    maxCandidates: 200

# Size Guards Configuration
# Prevents context overflow when reviewing large PRs
sizeGuards:
  enabled: true
  # Emit warning at this token count
  warnTokens: 150000
  # Truncate PR at this token count
  maxTokens: 200000
  # Per-provider overrides for different context limits
  providers:
    gemini:
      warnTokens: 750000
      maxTokens: 1000000

# Review Configuration
# Custom instructions to guide the code review process
# NOTE: Output format is handled by the system. These instructions focus on WHAT to review.
review:
  # GitHub bot username for auto-dismissing stale reviews
  # Set to "none" to disable auto-dismiss
  botUsername: "github-actions[bot]"

  # Block threshold: which severity levels trigger REQUEST_CHANGES
  # Valid: "critical", "high" (default), "medium", "low", "none"
  blockThreshold: "high"

  # Categories that always block regardless of severity
  alwaysBlockCategories:
    # - "security"

  # Fine-grained action control (overrides blockThreshold for specific severities)
  # actions:
  #   onCritical: "request_changes"
  #   onHigh: "request_changes"
  #   onMedium: "comment"
  #   onLow: "comment"
  #   onClean: "approve"
  #   onNonBlocking: "approve"

  instructions: |
    Perform a thorough, systematic review focusing on these categories:

    **Security (use category: "security", severity: "high" for vulnerabilities):**
    - Injection vulnerabilities (SQL, command, XSS)
    - Authentication/authorization issues
    - Sensitive data exposure (secrets, PII, API keys)
    - Input validation and sanitization
    - OWASP Top 10 vulnerabilities

    **Bugs (use category: "bug"):**
    - Null dereferences, off-by-one errors, logic errors (severity: "high")
    - Race conditions, resource leaks, deadlocks (severity: "high")
    - Edge cases: empty inputs, boundary conditions (severity: "medium")
    - Concurrency issues, goroutine leaks (severity: "high")

    **Test Coverage (use category: "test_coverage", severity: "medium"):**
    - Missing unit tests for new functionality
    - Untested edge cases and error paths
    - Weak assertions that don't verify behavior

    **Code Quality (use category: "maintainability", severity: "low"):**
    - DRY violations and duplicated code
    - Complex functions needing decomposition
    - Poor naming or unclear code
    - Silent error swallowing (use category: "error_handling", severity: "medium")

    **Architecture (use category: "architecture", severity: "medium"):**
    - SOLID principle violations
    - Inappropriate abstraction levels
    - Missing dependency injection

    **Performance (use category: "performance"):**
    - N+1 queries, unnecessary allocations (severity: "medium")
    - Poor algorithmic complexity (severity: "high" if significant)

    Prioritize: security vulnerabilities > bugs > error handling > everything else.
    Only report actionable issues. Skip stylistic preferences unless they impact clarity.

# HTTP Configuration
http:
  timeout: "120s"
  maxRetries: 5
  initialBackoff: "2s"
  maxBackoff: "30s"
  backoffMultiplier: 2.0
