name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git diff

      - name: Get head commit message
        id: get-commit
        run: |
          echo "message<<EOF" >> $GITHUB_OUTPUT
          git log -1 --format=%B ${{ github.event.pull_request.head.sha }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check for skip trigger
        id: skip-check
        env:
          COMMIT_MSG: ${{ steps.get-commit.outputs.message }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Check for [skip code-review] or [skip review] in commit, title, or body
          if echo "$COMMIT_MSG" | grep -qiE '\[skip (code-)?review\]'; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skip trigger found in commit message"
            exit 0
          fi
          if echo "$PR_TITLE" | grep -qiE '\[skip (code-)?review\]'; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skip trigger found in PR title"
            exit 0
          fi
          if echo "$PR_BODY" | grep -qiE '\[skip (code-)?review\]'; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skip trigger found in PR body"
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "No skip trigger found, proceeding with code review"

      - name: Run bop code review
        if: steps.skip-check.outputs.skip != 'true'
        uses: delightfulhammers/bop/action@v0.12.2
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          google-api-key: ${{ secrets.GEMINI_API_KEY }}
          block-threshold: "high"
          version: "v0.12.3"
