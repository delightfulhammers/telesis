# Telesis project configuration
project:
  name: Telesis
  owner: Delightful Hammers
  languages:
    - TypeScript
  status: active
  repo: github.com/delightfulhammers/telesis

intake:
  github:
    owner: delightfulhammers
    repo: telesis

git:
  commitToMain: true
  pushAfterCommit: false
  createPR: false

drift:
  expectedDirectories:
    - docs
    - docs/adr
    - docs/tdd
    - docs/context
    - src/adr
    - src/agent
    - src/cli
    - src/config
    - src/context
    - src/drift
    - src/milestones
    - src/mcp
    - src/orchestrator
    - src/scaffold
    - src/status
    - src/tdd
    - src/templates

pipeline:
  autoApprove: false
  closeIssue: false
  qualityGates:
    format: "pnpm run format"
    lint: "pnpm run lint"
    test: "pnpm test"
    build: "pnpm run build"
    drift: true
